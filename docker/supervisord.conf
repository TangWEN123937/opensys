; ==================== OpenSys Supervisord 配置 ====================
; 统一管理容器内多个进程：Xvfb + x11vnc + noVNC + FastAPI
; 替代原先的单进程 CMD，支持浏览器 GUI 远程桌面

[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

; --- Xvfb 虚拟显示器（提供 :99 显示器，供浏览器 non-headless 模式使用）---
[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; --- x11vnc（将 Xvfb 显示器暴露为 VNC 服务，端口 5900）---
[program:x11vnc]
command=/usr/bin/x11vnc -display :99 -forever -nopw -shared -rfbport 5900 -xkb
autostart=true
autorestart=true
priority=20
; 等待 Xvfb 启动
startsecs=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; --- noVNC（Web 客户端，用户通过浏览器访问 http://host:6080 查看/操作桌面）---
[program:novnc]
command=/usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 6080
autostart=true
autorestart=true
priority=30
; 等待 x11vnc 启动
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; --- cron 定时任务服务（定时触发 Agent 执行任务）---
[program:cron]
command=/usr/sbin/cron -f
autostart=true
autorestart=true
priority=35
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; --- FastAPI 服务（OpenSys Agent API）---
[program:fastapi]
command=python -m agent server --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
priority=40
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
