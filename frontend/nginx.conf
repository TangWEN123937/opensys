server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker 内置 DNS（127.0.0.11）+ 变量方式强制 nginx 做运行时 DNS 解析，
    # 避免启动时 agent 容器还未就绪导致 upstream 解析失败、nginx 循环重启。
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端 agent 容器
    # 注意：用变量形式的 proxy_pass 时，nginx 不会自动剥离 location 前缀，
    # 必须显式用 rewrite 去掉 /api 前缀，才能把请求打到后端的 /skills /conversations 等路由。
    location /api/ {
        set $agent_api http://agent:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $agent_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 支持：禁用缓冲
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # WebSocket 代理
    location /ws/ {
        set $agent_ws http://agent:8000;
        proxy_pass $agent_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # noVNC WebSocket 代理（websockify 通道）—— 必须放在 /novnc/ 之前
    # 把 /novnc/websockify → /websockify
    location /novnc/websockify {
        set $agent_vnc http://agent:6080;
        rewrite ^/novnc/websockify$ /websockify break;
        proxy_pass $agent_vnc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # noVNC 远程桌面代理（浏览器实时画面）
    # 把 /novnc/xxx → /xxx（静态文件）
    location /novnc/ {
        set $agent_vnc_static http://agent:6080;
        rewrite ^/novnc/(.*)$ /$1 break;
        proxy_pass $agent_vnc_static;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
